# Publishes to PyPI when a version tag is pushed.
# Repository secret: PYPI_API_TOKEN (PyPI → Account settings → API tokens).
# The build step verifies the tag matches the package version via GITHUB_REF_NAME — set automatically by GitHub Actions for the ref that triggered the run.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14.6"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dev-requirements.txt
      - name: Flake8
        run: flake8 .
      - name: Black
        run: black --check .
      - name: Test
        run: pytest tests

  publish:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14.6"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt build
      - name: Build sdist and wheel
        run: python -m build
      - name: Verify Git tag matches built version
        run: |
          expected="fero-${GITHUB_REF_NAME#v}.tar.gz"
          if [ ! -f "dist/$expected" ]; then
            echo "Built artifacts do not match tag ${GITHUB_REF_NAME}: expected dist/$expected"
            ls -1 dist
            exit 1
          fi
          echo "OK: $expected"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # The run may be triggered by a raw tag push (no release yet) or by
          # publishing a release from the UI (tag + release already exist), so
          # handle both: attach the built artifacts either way.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" --title "$TAG" --generate-notes dist/*
          fi
